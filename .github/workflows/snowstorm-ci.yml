name: Snowstorm CI

on:
  push:
    branches:
      - features/ako/snowstorm_automation
#  pull_request:
#    branches:
#      - master

jobs:
  Snowstorm-build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'