name: Snowstorm CI

on:
  push:
    branches:
      - features/ako/snowstorm_automation
#  pull_request:
#    branches:
#      - master

jobs:
  Snowstorm-build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'